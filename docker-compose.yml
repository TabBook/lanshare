services:
  lanshare:
    build: .
    container_name: lanshare
    ports:
      - "10088:10088"
    environment:
      TOKEN: ${TOKEN:?请在同目录 .env 文件中设置 TOKEN} # 必填：访问令牌，写在 .env 里

      MAX_STORAGE: 50GB                        # 可选：存储上限，超出后自动清理最旧文件
      TZ: Asia/Shanghai                        # 「跳转到日期」按此时区解析
      # PORT: 10088                            # 可选：容器内监听端口
    volumes:
      - ./data:/data # 备份此目录 = 完整备份
    restart: unless-stopped
